<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DEXO — Admin Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="ad-aksiya.css"/>
</head>
<body>
<div class="bg-grid"></div>

<!-- HEADER -->
<header class="top-header">
  <div class="header-left">
    <div class="logo-icon-sm">
      <svg width="20" height="20" viewBox="0 0 36 36" fill="none">
        <polygon points="18,2 34,10 34,26 18,34 2,26 2,10" fill="none" stroke="#00d4aa" stroke-width="2"/>
        <circle cx="18" cy="18" r="4" fill="#00d4aa"/>
      </svg>
    </div>
    <span class="header-brand">Admin Panel</span>
  </div>
  <button class="logout-btn" id="logout-btn">Chiqish</button>
</header>

<main class="page-content">

  <!-- ═══════ AKSIYA YARATISH ═══════ -->
  <div class="section-card">
    <div class="section-head">
      <div class="sh-icon">➕</div>
      <div>
        <div class="sh-title">Yangi aksiya yaratish</div>
        <div class="sh-sub">Boshlang'ich narx: $0.00001</div>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label>Aksiya belgisi (symbol)</label>
        <input id="new-symbol" type="text" placeholder="Masalan: DEXO, GOLD, APPLE" maxlength="12"/>
      </div>
      <div class="form-group">
        <label>To'liq nomi</label>
        <input id="new-name" type="text" placeholder="Masalan: DEXO Coin" maxlength="40"/>
      </div>
      <div class="form-group">
        <label>Emoji (ixtiyoriy)</label>
        <input id="new-emoji" type="text" placeholder="📊" maxlength="4"/>
      </div>
      <div class="form-group">
        <label>Tavsif (ixtiyoriy)</label>
        <input id="new-desc" type="text" placeholder="Qisqa tavsif..." maxlength="100"/>
      </div>
    </div>

    <div id="create-error" class="error-msg"></div>
    <button class="btn-primary" id="btn-create" onclick="createStock()">
      <span class="btn-text">Aksiya yaratish</span>
      <span class="btn-loader hidden" id="create-loader"></span>
    </button>
    <div id="create-success" class="success-msg"></div>
  </div>

  <!-- ═══════ NARX BOSHQARISH ═══════ -->
  <div class="section-card">
    <div class="section-head">
      <div class="sh-icon">📈</div>
      <div>
        <div class="sh-title">Narx boshqarish</div>
        <div class="sh-sub">Aksiya tanlang va foiz kiriting</div>
      </div>
    </div>

    <!-- Aksiya tanlash -->
    <div class="form-group">
      <label>Aksiyani tanlang</label>
      <select id="price-select">
        <option value="">— Aksiya tanlang —</option>
      </select>
    </div>

    <!-- Tanlangan aksiya info -->
    <div id="selected-info" class="selected-info hidden">
      <div class="si-row">
        <span class="si-label">Joriy narx:</span>
        <span class="si-val" id="si-price">—</span>
      </div>
      <div class="si-row">
        <span class="si-label">24s o'zgarish:</span>
        <span class="si-val" id="si-change">—</span>
      </div>
    </div>

    <!-- Foiz kiritish -->
    <div class="form-group" style="margin-top:14px">
      <label>O'zgartirish foizi (%)</label>
      <div class="pct-wrap">
        <input id="pct-input" type="number" placeholder="0.01" min="0.001" max="100" step="0.001"/>
        <span class="pct-sign">%</span>
      </div>
      <div class="quick-pcts">
        <button onclick="setPct(0.01)">0.01%</button>
        <button onclick="setPct(0.1)">0.1%</button>
        <button onclick="setPct(0.5)">0.5%</button>
        <button onclick="setPct(1)">1%</button>
        <button onclick="setPct(5)">5%</button>
        <button onclick="setPct(10)">10%</button>
      </div>
    </div>

    <div id="price-error" class="error-msg"></div>

    <!-- Ko'tarish / Tushirish -->
    <div class="action-btns">
      <button class="btn-up" id="btn-up" onclick="changePrice('up')">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Ko'tarish</span>
        <span class="btn-loader hidden" id="up-loader"></span>
      </button>
      <button class="btn-down" id="btn-down" onclick="changePrice('down')">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M19 12l-7 7-7-7" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Tushirish</span>
        <span class="btn-loader hidden" id="down-loader"></span>
      </button>
    </div>

    <div id="price-success" class="success-msg"></div>
  </div>

  <!-- ═══════ BARCHA AKSIYALAR ═══════ -->
  <div class="section-card">
    <div class="section-head">
      <div class="sh-icon">📋</div>
      <div>
        <div class="sh-title">Barcha aksiyalar</div>
        <div class="sh-sub">Ro'yxat va o'chirish</div>
      </div>
    </div>
    <div id="admin-stocks-list">
      <div class="stock-skeleton"></div>
      <div class="stock-skeleton"></div>
    </div>
  </div>

  <div style="height:40px"></div>
</main>

<script type="module" src="ad-aksiya.js"></script>
</body>
</html>
