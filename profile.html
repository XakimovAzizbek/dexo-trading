<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DEXO TRADING — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="profile.css"/>
</head>
<body>
<div class="bg-grid"></div>

<!-- ══════════ HEADER ══════════ -->
<header class="top-header">
  <div class="header-left">
    <div class="logo-icon-sm">
      <svg width="20" height="20" viewBox="0 0 36 36" fill="none">
        <polygon points="18,2 34,10 34,26 18,34 2,26 2,10" fill="none" stroke="#00d4aa" stroke-width="2"/>
        <circle cx="18" cy="18" r="4" fill="#00d4aa"/>
      </svg>
    </div>
    <span class="header-brand">Profile</span>
  </div>
  <button class="menu-btn" onclick="window.location.href='settings.html'" type="button" aria-label="Sozlamalar">
    <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
</header>

<main class="page-content">

  <!-- ═══ USER CARD ═══ -->
  <div class="user-card">
    <div class="user-avatar-wrap">
      <img id="user-avatar" src="" alt="avatar" class="user-avatar hidden"/>
      <div id="user-initials" class="user-initials">—</div>
    </div>
    <div class="user-name" id="user-name">Foydalanuvchi</div>
    <div class="user-email" id="user-email">—</div>
  </div>

  <!-- ═══ BALANCE CARD ═══ -->
  <div class="balance-card">
    <div class="balance-label">Umumiy balans</div>
    <div class="balance-amount">
      <span class="bal-dollar">$</span><span class="bal-int" id="bal-amount">0.00</span>
      <span class="bal-cur">USDT</span>
    </div>
    <div class="balance-meta">
      <span class="bal-tag">Portfolio:</span>
      <span class="bal-port" id="portfolio-value">$0.00 USDT</span>
      <span class="bal-pl" id="portfolio-pl">0.00%</span>
    </div>

    <div class="balance-actions">
      <button class="bal-btn deposit" onclick="window.location.href='deposit.html'" type="button">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Depozit
      </button>
      <button class="bal-btn withdraw" onclick="window.location.href='withdraw.html'" type="button">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12l7 7 7-7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Withdraw
      </button>
    </div>
  </div>

  <!-- ═══ QUICK STATS ═══ -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Aksiyalarim</div>
      <div class="stat-val" id="stat-stocks">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Umumiy P/L</div>
      <div class="stat-val" id="stat-pl">0.00%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Tranzaksiyalar</div>
      <div class="stat-val" id="stat-tx">0</div>
    </div>
  </div>

  <!-- ═══ KO'PROQ TUGMA ═══ -->
  <button class="more-btn" onclick="window.location.href='more.html'" type="button">
    <span class="more-icon">⚙️</span>
    <span class="more-text">Ko'proq</span>
    <svg class="more-chevron" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <!-- ═══ MENING AKSIYALARIM (faqat sotib olinganlar) ═══ -->
  <div class="section-title">Mening aksiyalarim</div>
  <div class="holdings-list" id="holdings-list">
    <div class="stock-skeleton"></div>
    <div class="stock-skeleton"></div>
  </div>

  <div style="height:90px"></div>
</main>

<!-- ══════════ BOTTOM NAV ══════════ -->
<nav class="bottom-nav">
  <a class="nav-item" href="home.html">
    <svg viewBox="0 0 24 24" fill="none"><path d="M3 12L12 3l9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>Home</span>
  </a>
  <a class="nav-item" href="market.html">
    <svg viewBox="0 0 24 24" fill="none"><path d="M3 17l4-4 4 4 4-6 4 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/></svg>
    <span>Market</span>
  </a>
  <a class="nav-item" href="trading.html">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <span>Trading</span>
  </a>
  <a class="nav-item active" href="profile.html">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <span>Profile</span>
  </a>
</nav>

<script type="module" src="profile.js"></script>
</body>
</html>
