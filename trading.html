<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DEXO TRADING — Trading</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="trading.css"/>
</head>
<body>
<div class="bg-grid"></div>

<!-- ══════════ HEADER ══════════ -->
<header class="top-header">
  <div class="header-left">
    <div class="logo-icon-sm">
      <svg width="20" height="20" viewBox="0 0 36 36" fill="none">
        <polygon points="18,2 34,10 34,26 18,34 2,26 2,10" fill="none" stroke="#00d4aa" stroke-width="2"/>
        <circle cx="18" cy="18" r="4" fill="#00d4aa"/>
      </svg>
    </div>
    <span class="header-brand">Trading</span>
  </div>
  <div class="header-bal">
    <span class="hb-label">Balans</span>
    <span class="hb-val" id="header-balance">$0.00</span>
  </div>
</header>

<main class="page-content">

  <!-- AKSIYA TANLASH / PAIR BAR -->
  <div class="pair-bar">
    <button class="pair-select-btn" id="pair-select-btn" onclick="togglePairList()">
      <span class="psb-icon" id="psb-icon">📊</span>
      <span class="psb-symbol" id="psb-symbol">Aksiya tanlang</span>
      <span class="psb-usdt">/USDT</span>
      <svg class="psb-chevron" viewBox="0 0 24 24" fill="none"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="pair-price-block">
      <span class="ppb-price" id="ppb-price">$0.00</span>
      <span class="ppb-change" id="ppb-change">0.00%</span>
    </div>
  </div>

  <!-- Pair dropdown list -->
  <div class="pair-list hidden" id="pair-list">
    <div class="pair-list-search">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="5" stroke="#6b7a8d" stroke-width="1.5"/><path d="M14 14l3 3" stroke="#6b7a8d" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="pair-search" placeholder="Aksiya qidirish..." oninput="renderPairList()"/>
    </div>
    <div id="pair-list-items"></div>
  </div>

  <!-- MARKET STATS -->
  <div class="market-stats" id="market-stats">
    <div class="ms-box">
      <div class="ms-label">24s Yuqori</div>
      <div class="ms-val up" id="ms-high">—</div>
    </div>
    <div class="ms-box">
      <div class="ms-label">24s Past</div>
      <div class="ms-val down" id="ms-low">—</div>
    </div>
    <div class="ms-box">
      <div class="ms-label">O'zgarish</div>
      <div class="ms-val" id="ms-change">—</div>
    </div>
  </div>

  <!-- MINI CHART LINK -->
  <a class="chart-link" id="chart-link" href="#">
    <span>📈 To'liq grafikni ko'rish</span>
    <svg viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>

  <!-- BUY / SELL TABS -->
  <div class="trade-tabs">
    <button class="ttab buy active" id="tab-buy" onclick="setTradeTab('buy')">Sotib olish</button>
    <button class="ttab sell" id="tab-sell" onclick="setTradeTab('sell')">Sotish</button>
  </div>

  <!-- TRADE PANEL -->
  <div class="trade-panel">

    <div class="tp-row">
      <span class="tp-label">Mavjud:</span>
      <span class="tp-avail" id="tp-available">0.00 USDT</span>
    </div>

    <div class="tp-field">
      <label>Narx</label>
      <div class="tp-input-wrap disabled">
        <input type="text" id="price-display" value="0.00" disabled/>
        <span class="tp-suffix">USDT</span>
      </div>
    </div>

    <div class="tp-field">
      <label id="amount-field-label">Miqdor (USDT)</label>
      <div class="tp-input-wrap">
        <input type="number" id="amount-input" placeholder="min 1.00" min="1" step="0.01" oninput="updateCalculation()"/>
        <span class="tp-suffix" id="amount-suffix">USDT</span>
      </div>
    </div>

    <div class="pct-row">
      <button onclick="setPct(25)">25%</button>
      <button onclick="setPct(50)">50%</button>
      <button onclick="setPct(75)">75%</button>
      <button onclick="setPct(100)">100%</button>
    </div>

    <div class="tp-summary" id="tp-summary">
      <div class="tps-row">
        <span>Siz olasiz:</span>
        <span id="sum-receive">—</span>
      </div>
      <div class="tps-row total">
        <span id="sum-total-label">Jami to'lov:</span>
        <span id="sum-total">—</span>
      </div>
    </div>

    <div id="trade-error" class="trade-msg error"></div>
    <div id="trade-success" class="trade-msg success"></div>

    <button class="btn-execute buy" id="btn-execute" onclick="executeTrade()">
      <span id="btn-execute-text">Sotib olish</span>
      <span class="btn-loader hidden" id="execute-loader"></span>
    </button>

  </div>

  <!-- MENING AKSIYALARIM -->
  <div class="holdings-card" id="holdings-card" style="display:none">
    <div class="hc-title">Mening aksiyalarim</div>
    <div id="holdings-list"></div>
  </div>

  <!-- SAVDO TARIXI -->
  <div class="history-card">
    <div class="hc-title">So'nggi savdolar</div>
    <div id="trade-history">
      <div class="empty-state"><p>Hali savdo yo'q</p></div>
    </div>
  </div>

  <div style="height:90px"></div>
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item" href="home.html">
    <svg viewBox="0 0 24 24" fill="none"><path d="M3 12L12 3l9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>Home</span>
  </a>
  <a class="nav-item" href="market.html">
    <svg viewBox="0 0 24 24" fill="none"><path d="M3 17l4-4 4 4 4-6 4 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/></svg>
    <span>Market</span>
  </a>
  <a class="nav-item active" href="trading.html">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <span>Trading</span>
  </a>
  <a class="nav-item" href="profile.html">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <span>Profile</span>
  </a>
</nav>

<script type="module" src="trading.js"></script>
</body>
</html>
