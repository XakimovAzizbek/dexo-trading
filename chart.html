<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DEXO — Aksiya grafigi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="chart.css"/>
</head>
<body>
<div class="bg-grid"></div>

<!-- HEADER -->
<header class="top-header">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <div class="header-stock" id="header-stock">
    <div class="hs-symbol" id="hs-symbol">—</div>
    <div class="hs-name"   id="hs-name">Yuklanmoqda...</div>
  </div>
  <div class="header-right-space"></div>
</header>

<!-- CONTENT -->
<main class="page-content">

  <!-- Price hero -->
  <div class="price-hero">
    <div class="ph-price" id="ph-price">$—</div>
    <div class="ph-change" id="ph-change">—</div>
  </div>

  <!-- Timeframe selector -->
  <div class="timeframe-selector">
    <button class="tf-btn active" onclick="changeTimeframe(60)">1m</button>
    <button class="tf-btn" onclick="changeTimeframe(600)">10m</button>
    <button class="tf-btn" onclick="changeTimeframe(3600)">1h</button>
    <button class="tf-btn" onclick="changeTimeframe(86400)">1d</button>
    <button class="tf-btn" onclick="changeTimeframe(2592000)">1M</button>
  </div>

  <!-- Chart Container -->
  <div class="chart-wrap">
    <div class="chart-container">
      <div class="chart-y-axis" id="chart-y-axis"></div>
      <div class="chart-canvas-wrapper">
        <canvas id="candlestick-chart"></canvas>
        <div class="chart-tooltip hidden" id="chart-tooltip">
          <div class="tooltip-row">
            <span class="tooltip-label">Ochilish:</span>
            <span class="tooltip-val" id="tooltip-open">—</span>
          </div>
          <div class="tooltip-row">
            <span class="tooltip-label">Yopilish:</span>
            <span class="tooltip-val" id="tooltip-close">—</span>
          </div>
          <div class="tooltip-row">
            <span class="tooltip-label">Eng yuqori:</span>
            <span class="tooltip-val" id="tooltip-high">—</span>
          </div>
          <div class="tooltip-row">
            <span class="tooltip-label">Eng past:</span>
            <span class="tooltip-val" id="tooltip-low">—</span>
          </div>
          <div class="tooltip-row">
            <span class="tooltip-label">O'zgarish:</span>
            <span class="tooltip-val" id="tooltip-change">—</span>
          </div>
          <div class="tooltip-time" id="tooltip-time">—</div>
        </div>
      </div>
      <div class="chart-x-axis" id="chart-x-axis"></div>
    </div>
    <div class="chart-empty hidden" id="chart-empty">
      <p>Narx tarixi hali yo'q</p>
    </div>
  </div>

  <!-- Stats grid -->
  <div class="stats-grid">
    <div class="stat-box">
      <div class="sb-label">Boshlan. narx</div>
      <div class="sb-val" id="sb-init">—</div>
    </div>
    <div class="stat-box">
      <div class="sb-label">Eng yuqori</div>
      <div class="sb-val up" id="sb-high">—</div>
    </div>
    <div class="stat-box">
      <div class="sb-label">Eng past</div>
      <div class="sb-val down" id="sb-low">—</div>
    </div>
    <div class="stat-box">
      <div class="sb-label">Shamlar soni</div>
      <div class="sb-val" id="sb-count">—</div>
    </div>
  </div>

  <!-- Stock info -->
  <div class="info-card" id="info-card"></div>

  <!-- Buy/Sell buttons -->
  <div class="trade-btns">
    <button class="tbtn buy" onclick="window.location.href='trading.html?id='+getStockId()+'&action=buy'">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 19V5M5 12l7-7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      Sotib olish
    </button>
    <button class="tbtn sell" onclick="window.location.href='trading.html?id='+getStockId()+'&action=sell'">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M19 12l-7 7-7-7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      Sotish
    </button>
  </div>

  <div style="height:30px"></div>
</main>

<script type="module" src="chart.js"></script>
</body>
</html>
