<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DEXO — Ko'proq</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="more.css"/>
</head>
<body>
<div class="bg-grid"></div>

<!-- HEADER -->
<header class="top-header">
  <div class="header-spacer"></div>
  <span class="header-title">Ko'proq</span>
  <button class="header-avatar-btn" onclick="window.location.href='profile.html'">
    <img id="header-avatar" class="hidden" alt="avatar"/>
    <span id="header-initials">U</span>
  </button>
</header>

<!-- CONTENT -->
<main class="page-content">

  <!-- User mini card -->
  <a href="profile.html" class="user-mini-card">
    <div class="umc-avatar">
      <img id="user-avatar" class="hidden" alt="avatar"/>
      <span id="user-initials">U</span>
    </div>
    <div class="umc-info">
      <div class="umc-name" id="user-name">Foydalanuvchi</div>
      <div class="umc-email" id="user-email">—</div>
    </div>
    <svg class="umc-chevron" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>

  <!-- Featured: Referral & Staking -->
  <div class="section-label">Imkoniyatlar</div>

  <button class="feature-card referral-card" onclick="window.location.href='referral.html'">
    <div class="fc-icon">
      <svg viewBox="0 0 24 24" fill="none"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="fc-body">
      <div class="fc-title">Referal dasturi</div>
      <div class="fc-sub">Do'stlaringizni taklif qiling, bonus oling</div>
    </div>
    <div class="fc-badge">5%</div>
    <svg class="fc-chevron" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <button class="feature-card staking-card" onclick="window.location.href='staking.html'">
    <div class="fc-icon">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/></svg>
    </div>
    <div class="fc-body">
      <div class="fc-title">Staking</div>
      <div class="fc-sub">USDT-ni saqlang, har kuni foiz oling</div>
    </div>
    <div class="fc-badge">25% APY</div>
    <svg class="fc-chevron" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <!-- Settings list -->
  <div class="section-label">Sozlamalar</div>

  <div class="menu-list">
    <button class="menu-row" onclick="toggleNotifications(this)">
      <div class="mr-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <span class="mr-label">Bildirishnomalar</span>
      <div class="mr-toggle" id="notif-toggle"><div class="mr-toggle-knob"></div></div>
    </button>

    <button class="menu-row" onclick="window.location.href='language.html'">
      <div class="mr-icon">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M2 12h20M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z" stroke="currentColor" stroke-width="2"/></svg>
      </div>
      <span class="mr-label">Til</span>
      <span class="mr-value">O'zbek</span>
      <svg class="mr-chevron" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <button class="menu-row" onclick="window.location.href='security.html'">
      <div class="mr-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="mr-label">Xavfsizlik</span>
      <svg class="mr-chevron" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <button class="menu-row" onclick="window.location.href='help.html'">
      <div class="mr-icon">
        <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 2-3 4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M12 17h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <span class="mr-label">Yordam markazi</span>
      <svg class="mr-chevron" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="app-version">DEXO TRADING — versiya 1.0.0</div>

  <button class="logout-row" id="logout-btn">
    <svg viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>Chiqish</span>
  </button>

  <div style="height:90px"></div>
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="home.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>Bosh sahifa</span>
  </a>
  <a href="market.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none"><path d="M3 3v18h18M7 14l4-4 4 4 5-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>Market</span>
  </a>
  <a href="more.html" class="nav-item active">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/><circle cx="5" cy="12" r="1.5" fill="currentColor"/></svg>
    <span>Ko'proq</span>
  </a>
  <a href="profile.html" class="nav-item">
    <svg viewBox="0 0 24 24" fill="none"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/></svg>
    <span>Profil</span>
  </a>
</nav>

<script type="module" src="more.js"></script>
</body>
</html>
