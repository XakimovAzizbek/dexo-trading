<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEXO TRADING — Bosh sahifa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="home.css" />
</head>
<body>

  <div class="bg-grid"></div>

  <!-- ══════════ TOP HEADER ══════════ -->
  <header class="top-header">
    <div class="header-left">
      <div class="logo-icon-sm">
        <svg width="22" height="22" viewBox="0 0 36 36" fill="none">
          <polygon points="18,2 34,10 34,26 18,34 2,26 2,10" fill="none" stroke="#00d4aa" stroke-width="2"/>
          <polygon points="18,8 28,14 28,22 18,28 8,22 8,14" fill="#00d4aa" opacity="0.15"/>
          <circle cx="18" cy="18" r="4" fill="#00d4aa"/>
        </svg>
      </div>
      <span class="header-brand">DEXO</span>
    </div>
    <div class="header-right">
      <div class="notif-btn" onclick="window.location.href='profile.html'">
        <img id="header-avatar" src="" alt="avatar" class="header-avatar hidden" />
        <div id="header-initials" class="header-initials">—</div>
      </div>
    </div>
  </header>

  <!-- ══════════ MAIN CONTENT ══════════ -->
  <main class="page-content" id="page-home">

    <!-- Balance card -->
    <div class="balance-card">
      <div class="balance-label">Umumiy balans</div>
      <div class="balance-amount" id="user-balance">
        <span class="bal-int">0</span><span class="bal-dec">.00</span>
        <span class="bal-cur">UZS</span>
      </div>
      <div class="balance-meta">
        <span class="bal-tag">Portfolio qiymati</span>
        <span class="bal-port" id="portfolio-value">+0.00 UZS</span>
      </div>
      <div class="balance-actions">
        <button class="bal-btn" onclick="window.location.href='market.html'">
          <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Sotib olish
        </button>
        <button class="bal-btn outline" onclick="window.location.href='trading.html'">
          <svg viewBox="0 0 24 24" fill="none"><path d="M7 16l5-5 5 5M7 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Savdo
        </button>
      </div>
    </div>

    <!-- Quick stats -->
    <div class="section-title">Statistika</div>
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Aksiyalarim</div>
        <div class="stat-val" id="stat-stocks">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Bugungi o'zgarish</div>
        <div class="stat-val up" id="stat-change">+0%</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tranzaksiyalar</div>
        <div class="stat-val" id="stat-tx">0</div>
      </div>
    </div>

    <!-- Hot stocks -->
    <div class="section-title">Mashhur aksiyalar</div>
    <div class="stocks-list" id="hot-stocks">
      <div class="stock-skeleton"></div>
      <div class="stock-skeleton"></div>
      <div class="stock-skeleton"></div>
    </div>

    <!-- Recent transactions -->
    <div class="section-title">So'nggi tranzaksiyalar</div>
    <div class="tx-list" id="tx-list">
      <div class="empty-state">
        <svg viewBox="0 0 48 48" fill="none"><rect x="8" y="12" width="32" height="28" rx="3" stroke="#2d3d52" stroke-width="2"/><path d="M16 20h16M16 28h10" stroke="#2d3d52" stroke-width="2" stroke-linecap="round"/></svg>
        <p>Hali tranzaksiya yo'q</p>
      </div>
    </div>

    <div style="height:90px"></div>
  </main>

  <!-- ══════════ BOTTOM NAV ══════════ -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="home.html">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 12L12 3l9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Home</span>
    </a>
    <a class="nav-item" href="market.html">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M3 17l4-4 4 4 4-6 4 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/>
      </svg>
      <span>Market</span>
    </a>
    <a class="nav-item" href="trading.html">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
        <path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Trading</span>
    </a>
    <a class="nav-item" href="profile.html">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/>
        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
      <span>Profile</span>
    </a>
  </nav>

  <script type="module" src="home.js"></script>
</body>
</html>
