<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DEXO TRADING — Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="market.css"/>
</head>
<body>
<div class="bg-grid"></div>

<!-- HEADER -->
<header class="top-header">
  <div class="header-left">
    <div class="logo-icon-sm">
      <svg width="22" height="22" viewBox="0 0 36 36" fill="none">
        <polygon points="18,2 34,10 34,26 18,34 2,26 2,10" fill="none" stroke="#00d4aa" stroke-width="2"/>
        <circle cx="18" cy="18" r="4" fill="#00d4aa"/>
      </svg>
    </div>
    <span class="header-brand">Market</span>
  </div>
  <div class="search-wrap">
    <svg viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="5" stroke="#6b7a8d" stroke-width="1.5"/><path d="M14 14l3 3" stroke="#6b7a8d" stroke-width="1.5" stroke-linecap="round"/></svg>
    <input id="search-input" type="text" placeholder="Aksiya qidirish..." oninput="filterStocks()"/>
  </div>
</header>

<!-- CONTENT -->
<main class="page-content">

  <!-- Filter tabs -->
  <div class="filter-tabs">
    <button class="ftab active" onclick="setFilter('all',this)">Barchasi</button>
    <button class="ftab" onclick="setFilter('up',this)">▲ O'sgan</button>
    <button class="ftab" onclick="setFilter('down',this)">▼ Tushgan</button>
  </div>

  <!-- Market summary -->
  <div class="market-summary" id="market-summary">
    <div class="ms-item">
      <div class="ms-label">Jami aksiyalar</div>
      <div class="ms-val" id="ms-total">—</div>
    </div>
    <div class="ms-divider"></div>
    <div class="ms-item">
      <div class="ms-label">O'sgan</div>
      <div class="ms-val up" id="ms-up">—</div>
    </div>
    <div class="ms-divider"></div>
    <div class="ms-item">
      <div class="ms-label">Tushgan</div>
      <div class="ms-val down" id="ms-down">—</div>
    </div>
  </div>

  <!-- Stocks list -->
  <div id="stocks-container">
    <div class="stock-skeleton"></div>
    <div class="stock-skeleton"></div>
    <div class="stock-skeleton"></div>
    <div class="stock-skeleton"></div>
  </div>

  <div style="height:90px"></div>
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a class="nav-item" href="home.html">
    <svg viewBox="0 0 24 24" fill="none"><path d="M3 12L12 3l9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <span>Home</span>
  </a>
  <a class="nav-item active" href="market.html">
    <svg viewBox="0 0 24 24" fill="none"><path d="M3 17l4-4 4 4 4-6 4 2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/></svg>
    <span>Market</span>
  </a>
  <a class="nav-item" href="trading.html">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/><path d="M8 12h8M12 8v8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <span>Trading</span>
  </a>
  <a class="nav-item" href="profile.html">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <span>Profile</span>
  </a>
</nav>

<script type="module" src="market.js"></script>
</body>
</html>
