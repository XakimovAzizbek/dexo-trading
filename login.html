<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DEXO TRADING — Kirish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <main class="center">

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <polygon points="18,2 34,10 34,26 18,34 2,26 2,10" fill="none" stroke="#00d4aa" stroke-width="2"/>
          <polygon points="18,8 28,14 28,22 18,28 8,22 8,14" fill="#00d4aa" opacity="0.15"/>
          <line x1="18" y1="2" x2="18" y2="34" stroke="#00d4aa" stroke-width="1" opacity="0.5"/>
          <line x1="2" y1="10" x2="34" y2="26" stroke="#00d4aa" stroke-width="1" opacity="0.5"/>
          <line x1="34" y1="10" x2="2" y2="26" stroke="#00d4aa" stroke-width="1" opacity="0.5"/>
          <circle cx="18" cy="18" r="4" fill="#00d4aa"/>
        </svg>
      </div>
      <div class="logo-text">
        <span class="logo-name">DEXO</span>
        <span class="logo-sub">TRADING</span>
      </div>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-header">
        <h1 class="card-title">Platformaga xush kelibsiz</h1>
        <p class="card-desc">DEXO TRADING — o'z birjangizda savdo qiling</p>
      </div>

      <div class="card-body">
        <div id="error-msg" class="error-msg"></div>

        <button class="btn-google" id="btn-google" onclick="handleGoogleLogin()">
          <svg class="google-icon" viewBox="0 0 48 48">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            <path fill="none" d="M0 0h48v48H0z"/>
          </svg>
          <span class="btn-google-text">Google orqali kirish</span>
          <span class="btn-loader hidden" id="google-loader"></span>
        </button>

        <p class="terms">
          Kirish orqali siz <span>Foydalanish shartlari</span> va
          <span>Maxfiylik siyosati</span>ga rozilik bildirasiz.
        </p>
      </div>
    </div>

    <p class="footer-note">© 2025 DEXO TRADING. Barcha huquqlar himoyalangan.</p>
  </main>

  <script type="module" src="login.js"></script>
</body>
</html>
